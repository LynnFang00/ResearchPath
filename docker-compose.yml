services:
  db:
    image: postgres:16
    container_name: researchpath-db
    environment:
      POSTGRES_DB: researchpath
      POSTGRES_USER: researchpath
      POSTGRES_PASSWORD: researchpath
    ports:
      - "5432:5432"
    volumes:
      - researchpath_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchpath -d researchpath"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://researchpath:researchpath@db:5432/researchpath
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  researchpath_postgres:
